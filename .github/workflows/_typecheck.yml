name: Type Check

on:
  workflow_call:
    inputs:
      package-path:
        required: true
        type: string

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install .[dev]
      - name: mypy typecheck
        run: mypy ${{ inputs.package-path }}