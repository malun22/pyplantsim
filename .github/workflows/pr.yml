name: Build Python Package (Pull Request)

on:
  pull_request:

jobs:
  pre-commit:
    permissions:
      contents: read
    uses: ./.github/workflows/_pre-commit.yml

  build:
    needs: [pre-commit]
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/_build.yml
    with:
      package-path: pyplantsim/
